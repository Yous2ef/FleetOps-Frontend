<div class="shipments-view">
    <header class="page-header">
        <h1>All Shipments</h1>
        <div class="search-box">
            <input type="text" id="shipment-search" class="form-input" placeholder="Search tracking ID or location..." />
        </div>
    </header>
    <div class="card">
        <table class="table" id="full-shipments-table">
            <thead>
                <tr>
                    <th>Tracking ID</th>
                    <th>Origin</th>
                    <th>Destination</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="5">Loading shipments...</td></tr>
            </tbody>
        </table>
        <div id="no-results" style="display: none; padding: 20px; text-align: center; color: var(--text-tertiary);">No shipments found.</div>
    </div>
</div>
