<div class="home-view">
    <header class="home-header">
        <h1>Dashboard</h1>
        <p>Welcome back! Here are your fleet statistics.</p>
    </header>
    <div class="kpi-grid" id="kpi-grid">
        <div class="card kpi-card"><p>Loading stats...</p></div>
    </div>
    <div class="card recent-shipments">
        <h2>Recent Shipments</h2>
        <table class="table" id="home-shipments-table">
            <thead>
                <tr>
                    <th>Tracking ID</th>
                    <th>Route</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="3">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
