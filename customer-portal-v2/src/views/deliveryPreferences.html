<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Instructions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* --- الأساسيات والألوان من التصميم --- */
        body {
            background-color: #eef2f9; /* لون الخلفية العلوي */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        /* محاكي شاشة الموبايل عشان التصميم يفضل ملموم ومظبوط */
        .mobile-container {
            width: 100%;
            max-width: 400px;
            background-color: #eef2f9;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        /* الهيدر العلوي */
        .header-top {
            padding: 30px 20px 40px 20px;
            color: #3b495c;
        }

        /* الورقة البيضا اللي طالعة من تحت (Bottom Sheet) */
        .bottom-sheet {
            background-color: #ffffff;
            border-radius: 30px 30px 0 0;
            padding: 20px;
            min-height: 80vh;
        }

        /* العلامة الرمادي اللي فوق في الورقة البيضا */
        .drag-handle {
            width: 40px;
            height: 5px;
            background-color: #d1d8e6;
            border-radius: 10px;
            margin: 0 auto 20px auto;
        }

        /* تنسيق الـ Alert */
        .custom-alert {
            background-color: #eef3ff;
            color: #5c7094;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            padding: 12px 15px;
        }

        /* تنسيق كروت الاختيارات */
        .pref-card {
            background-color: #eef3ff;
            color: #1a2a40;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .pref-card i {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #4a5c7a;
        }

        .pref-card span {
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* حالة الكارت وهو مختار (Active State) زي Figma */
        .pref-card.active {
            background-color: #68f4aa;
            color: #034d2f;
        }

        .pref-card.active i {
            color: #034d2f;
        }

        /* تنسيق الـ Textarea */
        .custom-textarea {
            border: 1px solid #e1e5ee;
            border-radius: 12px;
            resize: none;
            font-size: 0.9rem;
        }
        
        .custom-textarea:focus {
            box-shadow: none;
            border-color: #056c45;
        }

        /* أزرار الحفظ والإلغاء */
        .btn-save {
            background-color: #056c45;
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
        }

        .btn-save:hover {
            background-color: #045436;
            color: white;
        }

        .btn-cancel {
            color: #5c7094;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <div class="header-top d-flex justify-content-between align-items-center">
            <div class="fs-5 fw-bold d-flex align-items-center">
                <i class="bi bi-truck me-2"></i> Your Delivery
            </div>
            <div class="fw-bold text-secondary" style="font-size: 0.85rem;">Order #1293</div>
        </div>

        <div class="bottom-sheet shadow-sm">
            <div class="drag-handle"></div>
            
            <h4 class="fw-bold mb-3" style="color: #0b2240;">Delivery Instructions</h4>
            
            <div class="custom-alert d-flex align-items-center mb-4">
                <i class="bi bi-info-circle me-2"></i> 
                Can be updated until driver is out for delivery
            </div>

            <div class="row g-3 mb-4">
                <div class="col-6">
                    <div class="pref-card" data-value="ring_doorbell">
                        <i class="bi bi-bell"></i>
                        <span>Ring the doorbell</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="pref-card active" data-value="do_not_disturb">
                        <i class="bi bi-dash-circle-fill"></i>
                        <span>Do not disturb</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="pref-card" data-value="leave_at_door">
                        <i class="bi bi-door-closed"></i>
                        <span>Leave at door</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="pref-card" data-value="leave_with_neighbor">
                        <i class="bi bi-people"></i>
                        <span>Leave with neighbor</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="pref-card" data-value="leave_with_reception">
                        <i class="bi bi-building"></i>
                        <span>Leave with<br>reception</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="pref-card" data-value="do_not_leave_unattended">
                        <i class="bi bi-shield-check"></i>
                        <span>Do not leave unattended</span>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold" style="color: #0b2240; font-size: 0.9rem;">Additional notes for your driver</label>
                <textarea id="driverNotes" class="form-control custom-textarea p-3" rows="3" placeholder="e.g. Apt 4B, through the side gate..."></textarea>
            </div>

            <button class="btn btn-save w-100 mb-3 shadow-sm" onclick="saveAndNavigate()">Save Instructions</button>
            <div class="text-center">
                <a href="home.html" class="btn-cancel">Cancel</a>
            </div>

        </div>
    </div>

    <script>
        // 1. منطق اختيار الكروت (تغيير اللون)
        const cards = document.querySelectorAll('.pref-card');
        let selectedPreference = 'do_not_disturb'; // القيمة المبدئية

        cards.forEach(card => {
            card.addEventListener('click', function() {
                // شيل الـ active من كل الكروت
                cards.forEach(c => c.classList.remove('active'));
                
                // حط الـ active على الكارت اللي اتداس عليه
                this.classList.add('active');
                
                // احفظ القيمة عشان لو هتبعتها للـ Backend
                selectedPreference = this.getAttribute('data-value');
            });
        });

        // 2. منطق الحفظ والانتقال بين الصفحات
        function saveAndNavigate() {
            const notes = document.getElementById('driverNotes').value;
            
            // هنا تقدر تجمع الداتا وتبعته للـ API بتاعك
            console.log("Saving Data...");
            console.log("Preference:", selectedPreference);
            console.log("Notes:", notes);

            // دي طريقة الانتقال لصفحة تانية بالـ JS (Routing)
            // شيل الـ Comment من السطر اللي تحت وحط اسم الصفحة بتاعتك
            // window.location.href = "success_page.html";
            
            alert('تم حفظ البيانات! جاهز للانتقال للصفحة التالية.');
        }
    </script>
</body>
</html>
