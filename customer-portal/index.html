<script>
  document.addEventListener('DOMContentLoaded', function() {
      // 1. نجيب مسار الصفحة الحالية اللي اليوزر واقف عليها
      const currentUrlPath = window.location.pathname;
      
      // 2. نمسك كل اللينكات اللي جوه الـ Sidebar
      const navLinks = document.querySelectorAll('.sidebar__nav .nav-link');
      
      // 3. نلف عليهم واحد واحد
      navLinks.forEach(link => {
          // لو الـ href بتاع اللينك موجود جوه مسار الصفحة الحالية
          if (currentUrlPath.includes(link.getAttribute('href'))) {
              // ضيف كلاس active عشان يتلون ويظهر إنه الصفحة الحالية
              link.classList.add('active'); 
              // (تأكد إن عندك كلاس .active في الـ CSS بيدي لون مختلف للينك)
          } else {
              link.classList.remove('active');
          }
      });
  });
</script>
