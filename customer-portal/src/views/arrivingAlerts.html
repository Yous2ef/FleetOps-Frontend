<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Arriving</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f8faff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 5%;
        }

        .top-alert {
            background-color: #a34e47;
            color: white;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 24px;
        }

        .alert-icon {
            width: 40px;
            height: 40px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 992px) {
            .content-grid {
                grid-template-columns: 1fr 1fr;
                align-items: stretch;
            }
        }

        .map-card {
            background: linear-gradient(135deg, #2a3d4a, #16222a);
            border-radius: 24px;
            min-height: 400px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        .map-target-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a2b36;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .pin-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .map-pin {
            font-size: 4.5rem;
            color: #eef3ff;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: -20px;
        }

        .ripple {
            width: 150px;
            height: 50px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            position: absolute;
            bottom: -25px;
        }

        .ripple-2 {
            width: 250px;
            height: 80px;
            bottom: -40px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            position: absolute;
        }

        .distance-badge {
            position: absolute;
            bottom: 30px;
            background-color: #eef3ff;
            color: #0b2240;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .distance-badge i {
            color: #056c45;
            font-size: 0.6rem;
        }

        .custom-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.02);
            border: 1px solid #f0f2f5;
        }

        .card-blue {
            background-color: #f4f7fb;
            border-color: #e9eef5;
        }

        .badge-green {
            background-color: #68f4aa;
            color: #034d2f;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        .driver-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            background-color: #eef3ff;
            color: #0b2240;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: 0.2s;
        }

        .action-btn:hover {
            background-color: #dce6f9;
        }

        .ready-btn {
            background-color: #056c45;
            color: white;
            border-radius: 16px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .ready-btn:hover {
            background-color: #045436;
        }
        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 15px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            border-radius: 20px 20px 0 0;
            z-index: 100;
        }

        .nav-item {
            text-align: center;
            color: #a0aab8;
            font-size: 0.75rem;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 25%;
            transition: 0.2s;
        }

        .nav-item i { font-size: 1.2rem; }
        .nav-item.active { color: #056c45; font-weight: 600; }
        
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="top-alert">
            <div class="alert-icon">
                <i class="bi bi-geo-alt text-white"></i>
            </div>
            <div>
                <div style="font-weight: 800; font-size: 1.1rem;">🚚 Your driver is almost here!</div>
                <div style="font-size: 0.95rem; opacity: 0.9;">Arriving in 2-5 minutes</div>
            </div>
        </div>

        <div class="content-grid">
            
            <div class="map-card">
                <div class="map-target-btn">
                    <i class="bi bi-crosshair"></i>
                </div>
                
                <div class="pin-container">
                    <i class="bi bi-geo-alt-fill map-pin"></i>
                    <div class="ripple"></div>
                    <div class="ripple-2"></div>
                </div>
                
                <div class="distance-badge">
                    <i class="bi bi-circle-fill"></i> 500M AWAY
                </div>
            </div>

            <div class="d-flex flex-column gap-3">
                
                <div class="custom-card d-flex flex-column justify-content-between">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <i class="bi bi-cash-stack fs-4 text-success"></i>
                        <div class="badge-green">PREPARE CASH</div>
                    </div>
                    <div>
                        <div style="font-size: 0.75rem; color: #5c7094; font-weight: 700; letter-spacing: 1px;">TOTAL AMOUNT</div>
                        <div style="font-size: 1.6rem; color: #0b2240; font-weight: 800;">EGP 450</div>
                    </div>
                </div>

                <div class="custom-card card-blue">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <div style="background-color: #e1e8f2; padding: 6px 10px; border-radius: 8px;">
                            <i class="bi bi-clipboard-check text-secondary"></i>
                        </div>
                        <div style="font-weight: 700; color: #0b2240;">Instructions</div>
                    </div>
                    <p style="color: #4a5c7a; margin: 0; font-size: 0.95rem;">"Leave at front desk and notify security personnel upon arrival."</p>
                </div>

                <div class="custom-card d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-3">
                        <img src="https://i.pravatar.cc/150?img=11" alt="Driver" class="driver-img">
                        <div>
                            <div style="font-weight: 800; color: #0b2240; font-size: 1rem;">Ahmed K.</div>
                            <div style="font-size: 0.75rem; color: #4a5c7a; font-weight: 600;">
                                <span style="color: #f39c12;">★</span> 4.9 &bull; White Toyota<br>Hiace
                            </div>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="action-btn"><i class="bi bi-chat-dots"></i></button>
                        <button class="action-btn"><i class="bi bi-telephone"></i></button>
                    </div>
                </div>

                <button class="ready-btn mt-2">
                    I'm ready <i class="bi bi-check-circle"></i>
                </button>
                
            </div>
            
        </div>
        <nav class="bottom-nav">
        <a href="./deliveryFaild.html" class="nav-item">
            <i class="bi bi-layout-text-window"></i>
            <span>STATUS</span>
        </a>
        <a href="./arrivingAlerts.html" class="nav-item active">
            <i class="bi bi-map"></i>
            <span>TRACKING</span>
        </a>
        <a href="./delivered.html" class="nav-item">
            <i class="bi bi-receipt-cutoff"></i>
            <span>DETAILS</span>
        </a>
        <a href="./linkExpired.html" class="nav-item ">
            <i class="bi bi-question-circle-fill"></i>
            <span>SUPPORT</span>
        </a>
    </nav>
    </div>
    
    <script>
        document.querySelector('.ready-btn').addEventListener('click', function() {
            window.location.href = 'index.html'; 
        });
        
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                console.log('Action triggered');
            });
        });
    </script>
</body>
</html>
