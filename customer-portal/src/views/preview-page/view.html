<div class="settings-view">
    <header class="page-header">
        <h1>Account Settings</h1>
        <button id="save-btn" class="btn btn--primary" disabled>Save Changes</button>
    </header>
    <div class="settings-grid">
        <div class="card">
            <h2>Profile</h2>
            <div class="form-field">
                <label class="form-label" for="profile-name">Full Name</label>
                <input type="text" id="profile-name" class="form-input" placeholder="Loading..." />
            </div>
            <div class="form-field">
                <label class="form-label" for="profile-role">Role</label>
                <input type="text" id="profile-role" class="form-input" disabled />
            </div>
        </div>
        <div class="card">
            <h2>Preferences</h2>
            <div class="form-field">
                <label class="form-label" for="theme-select">Theme</label>
                <select id="theme-select" class="form-select">
                    <option value="dark">Dark Mode</option>
                    <option value="light">Light Mode</option>
                </select>
            </div>
        </div>
    </div>
</div>
